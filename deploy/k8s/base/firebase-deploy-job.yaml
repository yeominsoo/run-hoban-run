apiVersion: batch/v1
kind: Job
metadata:
  name: run-hoban-run-firebase-deploy
  labels:
    app.kubernetes.io/name: run-hoban-run
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: run-hoban-run
    spec:
      restartPolicy: Never
      containers:
        - name: firebase-deploy
          image: node:22-bookworm
          imagePullPolicy: IfNotPresent
          env:
            - name: SOURCE_REPO
              valueFrom:
                configMapKeyRef:
                  name: run-hoban-run-firebase-deploy
                  key: sourceRepo
            - name: SOURCE_SHA
              valueFrom:
                configMapKeyRef:
                  name: run-hoban-run-firebase-deploy
                  key: sourceSha
            - name: FIREBASE_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: run-hoban-run-firebase-deploy
                  key: firebaseProject
            - name: FIREBASE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: firebase-deploy-token
                  key: FIREBASE_TOKEN
            - name: VITE_RPS_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/rps"
            - name: VITE_LIAR_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/liar"
            - name: VITE_MAFIA_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/mafia"
            - name: VITE_HALLIGALLI_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/halligalli"
            - name: VITE_YUTNORI_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/yutnori"
            - name: VITE_STRATEGY_YUTNORI_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/strategy-yutnori"
            - name: VITE_MOLE_HUNT_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/mole-hunt"
            - name: VITE_MEMORY_SEQUENCE_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/memory-sequence"
            - name: VITE_UPDOWN_NUMBER_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/updown-number"
            - name: VITE_MULTIPLICATION_SPRINT_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/multiplication-sprint"
            - name: VITE_ODD_EVEN_MATH_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/odd-even-math"
            - name: VITE_COLOR_INSTRUCTION_WS_URL
              value: "wss://toris-arcade.duckdns.org:30080/color-instruction"
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -Eeuo pipefail

              if ! command -v git >/dev/null 2>&1; then
                apt-get update
                apt-get install -y --no-install-recommends git ca-certificates
                rm -rf /var/lib/apt/lists/*
              fi

              workdir="$(mktemp -d)"
              trap 'rm -rf "$workdir"' EXIT

              git init "$workdir"
              cd "$workdir"
              git remote add origin "$SOURCE_REPO"
              git fetch --depth 1 origin "$SOURCE_SHA"
              git checkout --detach FETCH_HEAD

              npm ci
              npm run build
              npx --yes firebase-tools@15.18.0 deploy \
                --only hosting \
                --project "$FIREBASE_PROJECT" \
                --non-interactive \
                --token "$FIREBASE_TOKEN"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
