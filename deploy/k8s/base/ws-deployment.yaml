apiVersion: apps/v1
kind: Deployment
metadata:
  name: run-hoban-run-ws
  labels:
    app.kubernetes.io/name: run-hoban-run-ws
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: run-hoban-run-ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: run-hoban-run-ws
    spec:
      containers:
        - name: ws
          image: ghcr.io/yeominsoo/run-hoban-run:ws-server
          ports:
            - name: ws
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: DATA_DIR
              value: /app/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: ws
          livenessProbe:
            httpGet:
              path: /healthz
              port: ws
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
