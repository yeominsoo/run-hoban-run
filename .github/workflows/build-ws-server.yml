name: Build & push ws-server image

on:
  push:
    branches:
      - master
    paths:
      - ws-server/**

env:
  IMAGE: ghcr.io/yeominsoo/run-hoban-run

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ws-server
          push: true
          tags: ${{ env.IMAGE }}:ws-server
