name: Request Firebase deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - deploy/k8s/base/firebase-deploy-revision.yaml

permissions:
  contents: write

env:
  DEPLOY_REVISION_PATH: deploy/k8s/base/firebase-deploy-revision.yaml

jobs:
  request-firebase-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: run-hoban-run-firebase-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Update Argo CD Firebase deploy revision
        run: |
          sed -i -E "s/sourceSha: \".*\"/sourceSha: \"${GITHUB_SHA}\"/" "${DEPLOY_REVISION_PATH}"

      - name: Commit deploy revision change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOY_REVISION_PATH}"
          git diff --cached --quiet && exit 0
          git commit -m "deploy(firebase): ${GITHUB_SHA} [skip ci]"
          git push
